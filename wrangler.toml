# ===========================================
# TrailView — Cloudflare Pages Configuration
# ===========================================
# This configures Cloudflare Pages Functions and R2 bindings.
#
# To deploy:
#   npx wrangler pages deploy out --project-name trailview
#
# To create the R2 bucket:
#   npx wrangler r2 bucket create trailview-assets
#
# To run locally with bindings:
#   npx wrangler pages dev out --r2 ASSETS_BUCKET=trailview-assets

name = "trailview"
compatibility_date = "2024-12-01"

# R2 bucket for storing GPX files, videos, and trail thumbnails
[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "trailview-assets"

# KV namespace for caching trail metadata and sync manifests
[[kv_namespaces]]
binding = "TRAIL_CACHE"
id = ""  # Fill in after running: npx wrangler kv namespace create TRAIL_CACHE

[vars]
ENVIRONMENT = "production"
